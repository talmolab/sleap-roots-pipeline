# ServiceAccount + least-privilege RBAC for Bloom's backend to submit sleap-roots pipeline
# Argo Workflows unattended (no human, no browser SSO) — see pipeline issue #17 / the A4
# "scoped credential" work. This is the Kubernetes-side identity; it's separate from the
# Supabase-side `bloom_workflows` DB credential used inside the pipeline pods.
#
# NAMESPACE UNCERTAINTY: we weren't sure whether the project/namespace is still
# `talmo-lab`/`runai-talmo-lab` or has moved to `busch-lab`. Rather than block on that,
# below are BOTH variants, back to back — apply whichever namespace actually exists in
# your cluster and delete/ignore the other block. (`runai-busch-lab` is a GUESS, following
# the same `runai-<project>` pattern `runai-talmo-lab` already uses for this RunAI
# installation — please correct the name if RunAI provisioned something different for
# `busch-lab`.) If genuinely BOTH namespaces exist and are both in active use, applying
# both is fine too — they're fully independent, namespace-scoped RBAC objects.
#
# apiVersion note: RBAC `Role`/`RoleBinding` are namespace-scoped (not cluster-wide) —
# this identity can do nothing outside whichever namespace(s) it's bound in below.

# =============================================================================
# Variant A: runai-talmo-lab
# =============================================================================
apiVersion: v1
kind: ServiceAccount
metadata:
  name: bloom-pipeline
  namespace: runai-talmo-lab
  labels:
    project: talmo-lab

---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: bloom-pipeline-workflow-submitter
  namespace: runai-talmo-lab
rules:
  # Core requirement: submit + observe per-scan Workflows (Bloom polls status to update
  # its own cyl_pipeline_runs/cyl_pipeline_run_scans tables and drive the Realtime UI).
  - apiGroups: ["argoproj.io"]
    resources: ["workflows"]
    verbs: ["create", "get", "list", "watch"]
  # Read-only: our Workflows reference pre-registered WorkflowTemplates (predictor,
  # trait-extractor) by templateRef — Bloom doesn't create/update templates, only reads them.
  # (Likely not strictly required — Argo resolves templateRef server-side via the
  # workflow-controller's own identity, not the submitter's — kept anyway since it's
  # harmless read-only access and untested either way.)
  - apiGroups: ["argoproj.io"]
    resources: ["workflowtemplates"]
    verbs: ["get", "list"]
  # NOT requested for v1 (intentionally omitted, least-privilege):
  #   - "delete"/"update" on workflows — no cancel/retry UX yet (EPIC #15, out of scope)
  #   - pods / pods/log — no live log streaming to the Bloom UI yet
  #   - anything on secrets, configmaps, nodes, or other namespaces
  # If any of these become needed later they're a one-line addition to this Role — flagging
  # now so it's not a surprise ask.

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: bloom-pipeline-workflow-submitter-binding
  namespace: runai-talmo-lab
subjects:
  - kind: ServiceAccount
    name: bloom-pipeline
    namespace: runai-talmo-lab
roleRef:
  kind: Role
  name: bloom-pipeline-workflow-submitter
  apiGroup: rbac.authorization.k8s.io

# =============================================================================
# Variant B: runai-busch-lab (namespace name GUESSED — correct if wrong)
# =============================================================================
apiVersion: v1
kind: ServiceAccount
metadata:
  name: bloom-pipeline
  namespace: runai-busch-lab # CONFIRM: real namespace name for the busch-lab project
  labels:
    project: busch-lab

---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: bloom-pipeline-workflow-submitter
  namespace: runai-busch-lab # CONFIRM: must match the ServiceAccount's namespace above
rules:
  - apiGroups: ["argoproj.io"]
    resources: ["workflows"]
    verbs: ["create", "get", "list", "watch"]
  - apiGroups: ["argoproj.io"]
    resources: ["workflowtemplates"]
    verbs: ["get", "list"]
  # Same intentional omissions as Variant A above (no delete/update, no pods/log, no
  # secrets/configmaps/nodes, nothing outside this one namespace).

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: bloom-pipeline-workflow-submitter-binding
  namespace: runai-busch-lab # CONFIRM: must match the ServiceAccount's namespace above
subjects:
  - kind: ServiceAccount
    name: bloom-pipeline
    namespace: runai-busch-lab
roleRef:
  kind: Role
  name: bloom-pipeline-workflow-submitter
  apiGroup: rbac.authorization.k8s.io

---
# Token generation — READ BEFORE RUNNING (applies to whichever namespace(s) you used above):
#
# This ServiceAccount is used by Bloom's backend running OUTSIDE the cluster (on bloom-dev,
# via the newly-opened network path to the k8s API), not from a pod inside the cluster. So:
#
#   - `kubectl create token bloom-pipeline -n <namespace>` (the modern default) mints a
#     short-lived, BOUND token (1h default, capped by the cluster's max token expiration) —
#     meant for in-cluster projected-volume use. It will expire and break unattended
#     automation without a human re-running this command.
#   - What we actually need is a long-lived (or effectively non-expiring) token that
#     doesn't require manual regeneration. The standard way to get one for an out-of-cluster
#     ServiceAccount is the legacy Secret-based token, created explicitly (no longer
#     auto-created by default since k8s 1.24):
#
#     apiVersion: v1
#     kind: Secret
#     metadata:
#       name: bloom-pipeline-token
#       namespace: <namespace>  # runai-talmo-lab and/or runai-busch-lab
#       annotations:
#         kubernetes.io/service-account.name: bloom-pipeline
#     type: kubernetes.io/service-account-token
#
#     Then `kubectl get secret bloom-pipeline-token -n <namespace> -o jsonpath='{.data.token}' | base64 -d`
#     gives a token that doesn't expire until the Secret is deleted / the SA is deleted.
#
#   - If cluster policy disallows that pattern, a very-long-duration
#     `kubectl create token bloom-pipeline -n <namespace> --duration=<N>h` also works, as
#     long as it's not capped shorter by `--service-account-max-token-expiration` on the API
#     server — please let us know if it gets capped so we can plan for rotation instead of
#     assuming it won't expire.
#
# If BOTH namespaces are real and both get set up, we need a separate token per namespace
# (they're independent ServiceAccounts even though they share a name) — please label which
# token belongs to which when you send them back.
#
# We need, bundled together (per namespace applied): the token (or a full kubeconfig with it
# embedded), the cluster's API server URL (10.7.30.173:6443, already confirmed reachable from
# bloom-dev), and the cluster CA certificate. Please hand these back over a secure channel
# (not plaintext Slack/email) — happy to use whatever your usual pattern is for sharing
# credentials.
